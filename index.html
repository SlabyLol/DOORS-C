<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOORS 2D - DarkFox Co. Fixed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Oswald:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
  body{background:#0a0a0f;color:#fff;font-family:'Oswald',sans-serif;overflow:hidden;width:100vw;height:100vh;touch-action:none;}
  canvas{display:block;}
  #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  #hud{position:fixed;top:0;left:0;width:100%;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(#0008,transparent);z-index:10;}
  .hud-item{font-size:18px;font-weight:700;text-shadow:0 0 8px #000;letter-spacing:1px;}
  #doorNum{font-family:'Creepster',cursive;font-size:28px;color:#f5c842;}
  #healthBar{width:140px;height:16px;background:#333;border:2px solid #666;border-radius:8px;overflow:hidden;}
  #healthFill{height:100%;background:linear-gradient(90deg,#e74c3c,#e74c3c);border-radius:8px;transition:width .3s;}
  #itemBar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;pointer-events:all;}
  .itemSlot{width:52px;height:52px;background:#111c;border:2px solid #555;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:border-color .2s;position:relative;}
  .itemSlot.active{border-color:#f5c842;box-shadow:0 0 10px #f5c8424a;}
  #mobileControls{position:fixed;bottom:80px;left:0;width:100%;display:none;z-index:10;pointer-events:all;}
  .dpad{position:fixed;bottom:90px;left:20px;width:120px;height:120px;}
  .dpad button{position:absolute;width:38px;height:38px;background:#ffffff22;border:2px solid #ffffff44;border-radius:8px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .dpad .up{top:0;left:41px;} .dpad .down{bottom:0;left:41px;} .dpad .left{left:0;top:41px;} .dpad .right{right:0;top:41px;}
  #mobileActionBtn{position:fixed;bottom:100px;right:20px;width:80px;height:80px;background:#f5c84233;border:3px solid #f5c842;border-radius:50%;color:#f5c842;font-weight:700;z-index:20;display:none;align-items:center;justify-content:center;}
  #menuScreen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
  .menu-title{font-family:'Creepster',cursive;font-size:80px;color:#f5c842;}
  .menu-btn{background:#111;border:2px solid #f5c842;color:#f5c842;padding:14px 40px;margin:10px;cursor:pointer;font-family:'Oswald';letter-spacing:2px;}
  #deathScreen{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
  #flashOverlay{position:fixed;inset:0;pointer-events:none;z-index:90;opacity:0;}
  #toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);color:#f5c842;background:rgba(0,0,0,0.8);padding:10px 20px;border-radius:5px;opacity:0;transition:0.3s;}
</style>
</head>
<body>

<div id="menuScreen">
    <div class="menu-title">DOORS 2D</div>
    <button class="menu-btn" onclick="startGame('pc')">PLAY PC</button>
    <button class="menu-btn" onclick="startGame('mobile')">PLAY MOBILE</button>
</div>

<div id="deathScreen">
    <h1 style="color:red; font-size:60px; font-family:'Creepster'">YOU DIED</h1>
    <p id="deathMsg" style="margin:20px">Killed by Rush</p>
    <button class="menu-btn" onclick="location.reload()">RETRY</button>
</div>

<div id="hud" style="display:none">
    <div class="hud-item">DOOR <span id="doorNum">001</span></div>
    <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
    <div class="hud-item">💰 <span id="goldNum">0</span></div>
</div>

<div id="mobileControls">
    <div class="dpad" id="dpadDiv">
        <button class="up" id="btnUp">W</button>
        <button class="left" id="btnLeft">A</button>
        <button class="right" id="btnRight">D</button>
        <button class="down" id="btnDown">S</button>
    </div>
    <div id="mobileActionBtn" onclick="game.interact()">ACT</div>
</div>

<div id="flashOverlay"></div>
<div id="toast"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let game, keys = {}, mobileDir = {up:false, down:false, left:false, right:false};

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function startGame(mode) {
    document.getElementById('menuScreen').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    if(mode === 'mobile') {
        document.getElementById('mobileControls').style.display = 'block';
        document.getElementById('mobileActionBtn').style.display = 'flex';
    }
    game = new Game(mode);
    loop();
}

// Input Fixes
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

['Up','Down','Left','Right'].forEach(d => {
    const btn = document.getElementById('btn'+d);
    btn.addEventListener('pointerdown', (e) => { e.preventDefault(); mobileDir[d.toLowerCase()] = true; });
    btn.addEventListener('pointerup', (e) => { e.preventDefault(); mobileDir[d.toLowerCase()] = false; });
});

class Game {
    constructor(mode) {
        this.mode = mode;
        this.door = 1;
        this.player = { x: 100, y: 100, hp: 100, gold: 0, size: 30 };
        this.monster = { active: false, x: -100, type: 'Rush' };
        this.objects = this.generateRoom();
    }

    generateRoom() {
        return {
            key: { x: Math.random() * (canvas.width-50), y: Math.random() * (canvas.height-50), collected: false },
            gold: { x: Math.random() * (canvas.width-50), y: Math.random() * (canvas.height-50), amount: 25, collected: false }
        };
    }

    interact() {
        if(!this.objects.key.collected && Math.hypot(this.player.x - this.objects.key.x, this.player.y - this.objects.key.y) < 50) {
            this.objects.key.collected = true;
            this.toast("Key found!");
        }
        if(this.objects.key.collected) {
            this.door++;
            this.objects = this.generateRoom();
            document.getElementById('doorNum').innerText = String(this.door).padStart(3, '0');
            if(Math.random() > 0.7) this.triggerRush();
        }
    }

    triggerRush() {
        this.monster.active = true;
        this.monster.x = -100;
        this.toast("SOMETHING IS COMING...", "red");
    }

    toast(msg, color="#f5c842") {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.color = color; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    update() {
        let dx = 0, dy = 0;
        if(keys['w'] || mobileDir.up) dy = -5;
        if(keys['s'] || mobileDir.down) dy = 5;
        if(keys['a'] || mobileDir.left) dx = -5;
        if(keys['d'] || mobileDir.right) dx = 5;
        this.player.x += dx; this.player.y += dy;

        if(!this.objects.gold.collected && Math.hypot(this.player.x - this.objects.gold.x, this.player.y - this.objects.gold.y) < 30) {
            this.objects.gold.collected = true;
            this.player.gold += this.objects.gold.amount;
            document.getElementById('goldNum').innerText = this.player.gold;
        }

        if(this.monster.active) {
            this.monster.x += 15;
            if(Math.abs(this.monster.x - this.player.x) < 40) {
                document.getElementById('deathScreen').style.display = 'flex';
                this.monster.active = false;
            }
            if(this.monster.x > canvas.width) this.monster.active = false;
        }
    }

    draw() {
        ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Player
        ctx.fillStyle = 'white'; ctx.fillRect(this.player.x, this.player.y, this.player.size, this.player.size);
        // Objects
        if(!this.objects.key.collected) { ctx.fillStyle = 'gold'; ctx.fillRect(this.objects.key.x, this.objects.key.y, 15, 15); }
        if(!this.objects.gold.collected) { ctx.fillStyle = 'yellow'; ctx.beginPath(); ctx.arc(this.objects.gold.x, this.objects.gold.y, 8, 0, Math.PI*2); ctx.fill(); }
        // Monster
        if(this.monster.active) { ctx.fillStyle = 'red'; ctx.fillRect(this.monster.x, 0, 50, canvas.height); }
    }
}

function loop() {
    game.update();
    game.draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
