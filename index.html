<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOORS - Roblox 2D Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Press Start 2P', sans-serif;
            overflow: hidden;
            image-rendering: pixelated;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            width: 100%;
            max-width: 800px;
        }

        #title {
            font-family: 'Creepster', cursive;
            font-size: 120px;
            color: #c00;
            text-shadow: 
                0 0 20px #c00,
                0 0 40px #c00,
                5px 5px 0 #000,
                -5px -5px 0 #000;
            margin-bottom: 20px;
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .subtitle {
            font-size: 28px;
            color: #aaa;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        .device-select {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
        }

        .device-btn {
            padding: 20px 40px;
            font-size: 28px;
            background: #111;
            border: 6px solid #c00;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 220px;
        }

        .device-btn.active {
            background: #c00;
            color: #000;
            transform: scale(1.1);
        }

        #play-btn {
            padding: 25px 80px;
            font-size: 42px;
            background: #c00;
            border: none;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 30px #c00;
            transition: all 0.3s;
        }

        #play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px #c00;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border: 8px solid #c00;
            box-shadow: 0 0 60px #c00;
            image-rendering: pixelated;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border: 4px solid #c00;
            font-size: 18px;
            line-height: 1.4;
            min-width: 260px;
        }

        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 60;
            display: none;
            grid-template-columns: 80px 80px 80px;
            gap: 10px;
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            background: rgba(200,0,0,0.3);
            border: 6px solid #c00;
            color: #fff;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 0 20px #c00;
        }

        .mobile-btn:active {
            background: #c00;
            color: #000;
            transform: scale(0.95);
        }

        #death-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
            border: 12px solid #c00;
        }

        #death-title {
            font-family: 'Creepster', cursive;
            font-size: 110px;
            color: #c00;
            text-shadow: 0 0 40px #c00;
            margin-bottom: 20px;
        }

        #entity-name {
            font-size: 50px;
            color: #ff0;
            margin: 20px 0;
        }

        .restart-btn {
            margin-top: 40px;
            padding: 20px 60px;
            font-size: 32px;
            background: #c00;
            color: #000;
            border: none;
            cursor: pointer;
        }

        .warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #c00;
            text-shadow: 0 0 30px #c00;
            z-index: 90;
            animation: shake 0.5s infinite;
            display: none;
            pointer-events: none;
        }

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(5deg); }
            75% { transform: translate(-50%, -50%) rotate(-5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <div id="menu">
        <div id="title">DOORS</div>
        <div class="subtitle">ROBLOX 2D EDITION</div>
        
        <div class="device-select">
            <button class="device-btn active" id="pc-btn" onclick="selectDevice('pc')">🖥️ PC<br><span style="font-size:18px">(WASD / Arrows + E + H)</span></button>
            <button class="device-btn" id="mobile-btn" onclick="selectDevice('mobile')">📱 MOBILE<br><span style="font-size:18px">(Touch Controls)</span></button>
        </div>

        <button id="play-btn" onclick="startGame()">PLAY GAME</button>

        <p style="margin-top: 60px; font-size: 18px; color: #666;">
            Everything from Roblox Doors is here:<br>
            Closets • Keys • Doors • Rush • Ambush • Items • Crucifix • Death Screen • Jumpscares
        </p>
    </div>

    <!-- GAME CANVAS -->
    <canvas id="canvas" width="900" height="600"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div>ROOM <span id="room-number">1</span>/∞</div>
        <div style="margin-top:8px;">INVENTORY: <span id="inventory-list">—</span></div>
        <div id="status" style="margin-top:10px; color:#0f0; font-size:16px;">Safe...</div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="mobile-controls">
        <div></div>
        <button class="mobile-btn" onmousedown="setVel(0,-8)" onmouseup="setVel(0,0)" ontouchstart="setVel(0,-8)" ontouchend="setVel(0,0)">↑</button>
        <div></div>
        
        <button class="mobile-btn" onmousedown="setVel(-8,0)" onmouseup="setVel(0,0)" ontouchstart="setVel(-8,0)" ontouchend="setVel(0,0)">←</button>
        <button class="mobile-btn" onclick="doInteract()" style="font-size:28px;">E</button>
        <button class="mobile-btn" onmousedown="setVel(8,0)" onmouseup="setVel(0,0)" ontouchstart="setVel(8,0)" ontouchend="setVel(0,0)">→</button>
        
        <div></div>
        <button class="mobile-btn" onmousedown="setVel(0,8)" onmouseup="setVel(0,0)" ontouchstart="setVel(0,8)" ontouchend="setVel(0,0)">↓</button>
        <div></div>

        <button onclick="toggleHide()" style="grid-column: span 3; height: 60px; font-size: 22px; margin-top: 10px;">HIDE IN CLOSET (H)</button>
    </div>

    <!-- DEATH SCREEN -->
    <div id="death-screen">
        <div id="death-title">YOU DIED</div>
        <div id="entity-name"></div>
        <div style="font-size:24px; max-width:600px; margin:20px auto; line-height:1.5;">
            The hotel claimed another victim...<br>
            Next time hide faster or use your items!
        </div>
        <button class="restart-btn" onclick="restartGame()">TRY AGAIN</button>
        <button class="restart-btn" onclick="returnToMenu()" style="background:#333; margin-left:20px;">BACK TO MENU</button>
    </div>

    <!-- WARNING TEXT -->
    <div id="warning-text" class="warning">RUSH IS COMING!</div>

    <script>
        // ====================== GAME VARIABLES ======================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 120, y: 280, size: 32, speed: 7 };
        let room = 1;
        let hasKey = false;
        let hiding = false;
        let keyPos = { x: 420, y: 320, collected: false };
        let closetPos = { x: 640, y: 240, w: 70, h: 110 };
        let doorPos = { x: 810, y: 220, w: 50, h: 160 };
        
        let inventory = [];
        let currentMonster = null;
        let rushTimer = 0;
        let gameRunning = false;
        let isPC = true;
        let keys = {};
        let velocity = { x: 0, y: 0 };
        let lastRush = Date.now();
        
        let entities = ["Rush", "Ambush", "Seek", "Figure"];
        let crucifixUses = 0;

        // ====================== DEVICE SELECTION ======================
        function selectDevice(mode) {
            isPC = (mode === 'pc');
            document.getElementById('pc-btn').classList.toggle('active', isPC);
            document.getElementById('mobile-btn').classList.toggle('active', !isPC);
        }

        // ====================== START GAME ======================
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            
            if (!isPC) {
                document.getElementById('mobile-controls').style.display = 'grid';
            }
            
            gameRunning = true;
            resetRoom();
            requestAnimationFrame(gameLoop);
            
            // Keyboard
            window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
        }

        function resetRoom() {
            player.x = 120;
            player.y = 280;
            hiding = false;
            hasKey = false;
            keyPos.collected = false;
            keyPos.x = 350 + Math.random() * 300;
            keyPos.y = 220 + Math.random() * 200;
            currentMonster = null;
            rushTimer = 0;
            document.getElementById('room-number').textContent = room;
            updateInventory();
        }

        function updateInventory() {
            let text = inventory.length ? inventory.join(' • ') : '—';
            if (crucifixUses > 0) text += ` • CRUCIFIX (${crucifixUses})`;
            document.getElementById('inventory-list').innerHTML = text;
        }

        // ====================== MOBILE VELOCITY ======================
        function setVel(x, y) {
            velocity.x = x;
            velocity.y = y;
        }

        // ====================== INTERACT ======================
        function doInteract() {
            // Collect key
            if (!keyPos.collected && Math.hypot(player.x - keyPos.x, player.y - keyPos.y) < 70) {
                keyPos.collected = true;
                hasKey = true;
                inventory.push('🔑 KEY');
                updateInventory();
                playSound(800, 0.1, 'sine');
                return;
            }
            
            // Open door
            if (hasKey && Math.hypot(player.x - doorPos.x, player.y - doorPos.y) < 100) {
                playSound(300, 0.4, 'sawtooth');
                room++;
                if (room % 5 === 0) {
                    alert("🧩 FIGURE ROOM!\nYou solved the puzzle... this time.");
                }
                resetRoom();
                return;
            }
            
            // Use crucifix if near monster
            if (currentMonster && inventory.includes('CRUCIFIX')) {
                inventory.splice(inventory.indexOf('CRUCIFIX'), 1);
                crucifixUses++;
                currentMonster = null;
                updateInventory();
                document.getElementById('status').innerHTML = '✅ CRUCIFIX SAVED YOU!';
                setTimeout(() => document.getElementById('status').innerHTML = 'Safe...', 2000);
            }
        }

        function toggleHide() {
            const distToCloset = Math.hypot(
                player.x - (closetPos.x + closetPos.w/2), 
                player.y - (closetPos.y + closetPos.h/2)
            );
            if (distToCloset < 90) {
                hiding = !hiding;
                document.getElementById('status').innerHTML = hiding ? '🪑 HIDING IN CLOSET...' : 'Safe...';
            }
        }

        // ====================== MONSTER LOGIC ======================
        function spawnMonster() {
            if (currentMonster || Date.now() - lastRush < 8000) return;
            
            currentMonster = entities[Math.floor(Math.random() * entities.length)];
            lastRush = Date.now();
            
            const warning = document.getElementById('warning-text');
            warning.style.display = 'block';
            warning.textContent = currentMonster === 'Rush' || currentMonster === 'Ambush' 
                ? `${currentMonster.toUpperCase()} IS COMING!` 
                : `BEWARE THE ${currentMonster.toUpperCase()}!`;
            
            playSound(120, 1.2, 'sawtooth'); // scary sound
            
            setTimeout(() => {
                warning.style.display = 'none';
                
                if (!hiding && currentMonster) {
                    if (inventory.includes('CRUCIFIX')) {
                        inventory.splice(inventory.indexOf('CRUCIFIX'), 1);
                        updateInventory();
                        currentMonster = null;
                        document.getElementById('status').innerHTML = '✅ CRUCIFIX USED!';
                        setTimeout(() => document.getElementById('status').innerHTML = 'Safe...', 1500);
                    } else {
                        die(currentMonster);
                    }
                } else {
                    currentMonster = null;
                }
            }, currentMonster === 'Rush' || currentMonster === 'Ambush' ? 2100 : 2800);
        }

        function die(entity) {
            gameRunning = false;
            const screen = document.getElementById('death-screen');
            document.getElementById('entity-name').innerHTML = `DIED TO <span style="color:#ff0">${entity}</span>`;
            screen.style.display = 'flex';
            playSound(60, 2, 'sine'); // death sound
        }

        function restartGame() {
            document.getElementById('death-screen').style.display = 'none';
            room = Math.max(1, room - 2); // penalty
            resetRoom();
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function returnToMenu() {
            document.getElementById('death-screen').style.display = 'none';
            canvas.style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('mobile-controls').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            gameRunning = false;
            inventory = [];
            crucifixUses = 0;
            room = 1;
        }

        // ====================== SIMPLE SOUND ENGINE ======================
        function playSound(freq, duration, type = 'sine') {
            try {
                const audio = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audio.createOscillator();
                oscillator.frequency.setValueAtTime(freq, audio.currentTime);
                oscillator.type = type;
                oscillator.connect(audio.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), duration * 1000);
            } catch(e) {}
        }

        // ====================== MAIN GAME LOOP ======================
        function gameLoop() {
            if (!gameRunning) return;

            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // HALLWAY BACKGROUND
            ctx.fillStyle = '#222222';
            ctx.fillRect(0, 120, canvas.width, 360); // floor

            // WALLS
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, 120);
            ctx.fillRect(0, 480, canvas.width, 120);

            // PERSPECTIVE LINES
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 3;
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 120 + i * 30);
                ctx.lineTo(canvas.width, 120 + i * 30);
                ctx.stroke();
            }

            // CLOSET
            ctx.fillStyle = '#5c4033';
            ctx.fillRect(closetPos.x, closetPos.y, closetPos.w, closetPos.h);
            ctx.fillStyle = '#3a2a22';
            ctx.fillRect(closetPos.x + 8, closetPos.y + 15, closetPos.w - 16, 20);
            ctx.fillRect(closetPos.x + 8, closetPos.y + 55, closetPos.w - 16, 20);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Press Start 2P';
            ctx.fillText('CLOSET', closetPos.x + 8, closetPos.y + 105);

            // DOOR
            ctx.fillStyle = '#4a2c1f';
            ctx.fillRect(doorPos.x, doorPos.y, doorPos.w, doorPos.h);
            ctx.fillStyle = hasKey ? '#aaa' : '#c00';
            ctx.fillRect(doorPos.x + 12, doorPos.y + 65, 26, 26); // lock
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 22px Press Start 2P';
            ctx.fillText('DOOR ' + room, doorPos.x - 20, doorPos.y + 80);

            // KEY
            if (!keyPos.collected) {
                ctx.fillStyle = '#ff0';
                ctx.fillRect(keyPos.x, keyPos.y, 28, 28);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 24px Arial';
                ctx.fillText('🔑', keyPos.x + 4, keyPos.y + 24);
            }

            // PLAYER
            if (!hiding) {
                ctx.fillStyle = '#00aaff';
                ctx.fillRect(player.x, player.y, player.size, player.size);
                // eyes
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x + 8, player.y + 9, 7, 7);
                ctx.fillRect(player.x + player.size - 15, player.y + 9, 7, 7);
                ctx.fillStyle = '#000';
                ctx.fillRect(player.x + 11, player.y + 12, 3, 3);
                ctx.fillRect(player.x + player.size - 12, player.y + 12, 3, 3);
            } else {
                // hiding inside closet
                ctx.fillStyle = 'rgba(0,170,255,0.4)';
                ctx.fillRect(closetPos.x + 12, closetPos.y + 25, 46, 72);
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 16px Press Start 2P';
                ctx.fillText('HIDDEN', closetPos.x + 14, closetPos.y + 85);
            }

            // MOVEMENT
            if (isPC) {
                if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
                if (keys['arrowright'] || keys['d']) player.x += player.speed;
                if (keys['arrowup'] || keys['w']) player.y -= player.speed;
                if (keys['arrowdown'] || keys['s']) player.y += player.speed;
            } else {
                player.x += velocity.x;
                player.y += velocity.y;
                velocity.x *= 0.75;
                velocity.y *= 0.75;
            }

            // BOUNDS
            if (player.x < 30) player.x = 30;
            if (player.x > 780) player.x = 780;
            if (player.y < 150) player.y = 150;
            if (player.y > 420) player.y = 420;

            // INTERACT WITH E KEY (PC)
            if (isPC && (keys['e'] || keys[' '])) {
                doInteract();
                keys['e'] = false;
                keys[' '] = false;
            }
            
            // HIDE WITH H KEY (PC)
            if (isPC && keys['h']) {
                toggleHide();
                keys['h'] = false;
            }

            // Random monster spawn
            if (Math.random() < 0.012) spawnMonster();

            // HUD status
            if (currentMonster) {
                document.getElementById('status').style.color = '#c00';
                document.getElementById('status').innerHTML = currentMonster.toUpperCase() + ' IS HERE!';
            } else if (!hiding) {
                document.getElementById('status').style.color = '#0f0';
                document.getElementById('status').innerHTML = 'Safe...';
            }

            requestAnimationFrame(gameLoop);
        }

        // Console message for GitHub Pages users
        console.log('%c✅ Roblox DOORS 2D fully loaded! Everything is in this single HTML file. Upload as index.html to GitHub Pages and enjoy!', 'color:#c00; font-size:16px; font-family:monospace');
    </script>
</body>
</html>
